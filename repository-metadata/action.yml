name: Repository Metadata
description: Dump CODEOWNERS and maintainers from all repositories in an organization into an audit directory

inputs:
  token:
    description: "GitHub token or GitHub App token with repo and org read permissions"
    required: true
  owner:
    description: "GitHub organization or user login. Defaults to the current repository owner."
    required: false
    default: ${{ github.repository_owner }}
  output_dir:
    description: "Directory to write audit files into"
    required: false
    default: "audit"

outputs:
  output_dir:
    description: "Path to the directory containing the generated audit files"
    value: ${{ steps.dump.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "24.15.0"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install --production --prefer-offline

    - name: Dump CODEOWNERS and maintainers
      id: dump
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_OWNER: ${{ inputs.owner }}
        INPUT_OUTPUT_DIR: ${{ inputs.output_dir }}
      run: node ${{ github.action_path }}/src/index.js
